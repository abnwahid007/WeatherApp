<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">

        <h1>Weather App</h1>

        <div class="tab-container">
            <p class="tab" data-userWeather>Your Weather</p>        
            <p class="tab" data-searchWeather>Search Weather</p>        
        </div>

        <div class="weather-container">
            <!--grant location container-->
            <div class="grant-location-container">
                <img src="./asset/4781517.png" alt="" width="80" height="80" loading="lazy">
                <p>Grant location access</p>
                <p>Allow access to get weather information</p>
                <button class="btn" data-grantAccess>Grant Access</button>
            </div>

            <!--search form-->
            <form action="" class="form-container" data-searchForm>
                <input type="" placeholder="Search for city: " data-searchInput>
                <button class="btn">
                    <img src="./asset/search.png" alt="" height="20" width="20" loading="lazy">
                </button>
            </form>

            <!--loading screen container-->
            <div class="loadng-container">
                <img src="./asset/loading.gif" alt="" width="100" height="100" loading="lazy">
                <p>Loading</p>
            </div>

            <!--show weather info-->
            <div class="user-info-container">
                <!--city name and flag-->
                <div class="name">
                    <p data></p>
                    <img src="" alt="" data-countryIcon>
                </div>

                <!--weather description-->
                <p data-weatherDesc></p>
                <!--weather icon-->
                <img src="" alt="" data-weatherIcon>
                <!--temperature-->
                <p data-temp></p>

                <!--3 card parameter-->
                <div class="parameter">
                    <img src="./asset/wind.png" alt="" height="50" width="50">
                    <p>windspeed</p>
                    <p data-windspeed></p>
                </div>
                <div class="parameter">
                    <img src="./asset/humidity.png" alt="" height="50" width="50">
                    <p>humidity</p>
                    <p data-windspeed></p>
                </div>
                <div class="parameter">
                    <img src="./asset/clouds.png" alt="" height="50" width="50">
                    <p>cloudes</p>
                    <p data-windspeed></p>
                </div>

            </div>

        </div>
 
    </div>


    <script src="index.js"></script>
</body>
</html>
